name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: CI checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig-dev libxkbcommon-dev libdbus-1-dev libudev-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features
        env:
          RUSTFLAGS: -D warnings

      - name: Test
        run: |
          cargo test --all
          bash tests/portable_scope.sh
          python3 -m unittest tests/test_blackshark_state.py

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: check

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install system dependencies (x86_64 only)
        if: matrix.use_cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig-dev libxkbcommon-dev libdbus-1-dev libudev-dev pkg-config

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --all

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --all --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          TARGET=${{ matrix.target }}
          OUTDIR="blackshark-ctl-${GITHUB_REF_NAME}-${TARGET}"
          mkdir -p "$OUTDIR"

          for bin in blacksharkd blackshark-ctl blackshark-gui; do
            cp "target/$TARGET/release/${bin}" "$OUTDIR/" 2>/dev/null || \
            cp "target/release/${bin}" "$OUTDIR/"
          done

          cp -r dkms "$OUTDIR/"
          cp blackshark blackshark-state polybar-blackshark install.sh update.sh "$OUTDIR/"
          cp 60-blackshark.rules README.md LICENSE "$OUTDIR/"

          tar czf "${OUTDIR}.tar.gz" "$OUTDIR"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackshark-ctl-${{ github.ref_name }}-${{ matrix.target }}
          path: blackshark-ctl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
