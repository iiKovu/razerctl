PACKAGE_NAME="razer-cfg255"
PACKAGE_VERSION="1.0"
BUILT_MODULE_NAME[0]="razer-cfg255"
DEST_MODULE_LOCATION[0]="/updates/dkms"
AUTOINSTALL="yes"

# Clang/LLVM-built kernels (e.g. CachyOS) need LLVM=1 so the module's toolchain
# matches the kernel's; gcc kernels must not pass it. Detect from the kernel config.
_LLVM=""
if grep -q "CONFIG_CC_IS_CLANG=y" "${kernel_source_dir}/.config" 2>/dev/null; then
	_LLVM="LLVM=1"
fi
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build ${_LLVM} modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build ${_LLVM} clean"
